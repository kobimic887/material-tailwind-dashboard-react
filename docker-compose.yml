services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: outwize-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: outwize-backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
